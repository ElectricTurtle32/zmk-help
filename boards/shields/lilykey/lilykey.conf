# Enable Split support
CONFIG_ZMK_SPLIT=y

# Enable ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# USB Configuration for better compatibility
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_HID_DEVICE=y

# Turn on logging
CONFIG_ZMK_USB_LOGGING=y
# Optional: finer detail for matrix debugging
CONFIG_ZMK_LOG_LEVEL_DBG=y

# Ensure keyboard works as peripheral and central correctly
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y