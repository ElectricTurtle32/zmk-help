# Enable Split support
CONFIG_ZMK_SPLIT=y

# Enable ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# USB Configuration - explicitly enable HID for ZMK Studio
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_HID_DEVICE=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_HID_INDICATORS=y

# Turn on logging
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y

# Ensure keyboard works as peripheral and central correctly
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y

# Matrix scan settings for reliable key detection
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5